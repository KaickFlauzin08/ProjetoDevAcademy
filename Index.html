  <!doctype html>
  <html lang="pt-br">
    <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <title>DevAcademy - Acesso</title>
      <link rel="stylesheet" href="/Css/style.css" />
    </head>
    <body>
<div class="auth-container">
    <div class="form-card">
        <div id="mensagemBox" style="display:none; margin-bottom: 10px;"></div>

        <div id="login-section">
            <h2>Bem-vindo de volta</h2>
            <form id="formulario-login">
                <div class="input-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" required placeholder="seu@email.com" />
                </div>
                <div class="input-group">
                    <label for="senha">Senha</label>
                    <input type="password" id="senha" required placeholder="••••••••" />
                </div>
                <button id="bnt" type="submit" class="btn">Entrar</button>
            </form>
            <div class="switch-text">
                <p>Não tem uma conta? <a class="btn-link" href="Cadastrar.html">Criar conta</a></p>
            </div>
        </div>
    </div>
</div>
          <!-- LOGIN -->
          <div id="dashboard-section" class="hidden" >
            <h2>Painel Protegido</h2>
            <p>Olá, você está logado!</p>
            <div class="gap">
            <button id="fetch-data-btn" class="btn">Buscar dados</button>
            <div id="api-data"></div>
            <button id="logout-btn" class="btn">Sair</button>
          </div>
        </div>
        

      <script src="script.js"></script>
    </body>
  </html>
