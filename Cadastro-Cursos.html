<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastrar - Cursos</title>
    <link rel="stylesheet" href="Css/Cadastro-Cursos.css">
</head>
<body>
    <div id="mensagemBox" style="display:none;"></div>
    <form id="Registro-curso">
        <div class="cards">
            <div class="Titulo">
                <h1>Registrar Curso</h1>
            </div>
        <input type="text" id="titulo-curso" required placeholder="Digite o nome do curso">
        <input type="text" id="descricao-curso" placeholder="Digite uma descrição">
        <input type="number" name="" id="CargaH-curso" placeholder="Digite a Carga horaria">
        <button type="submit" id="Bnt-Curso">Registrar</button>
        <p>Já tem um curso? Então faça o <a href="Index.html">login</a></p>
        </div>
        <button type="button" id="btn-sair" class="btn-secondary">Sair da Conta</button>
    </form>
    <script src="Curso.js"></script>
</body>
</html>
