<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevAcademy - Acesso</title>
    <link rel="stylesheet" href="Css/Cadastrar.css">
</head>
<body>
<div class="auth-container">
    <div class="form-card">
        <div id="mensagemBox" style="display:none; margin-bottom: 10px;"></div>
        <div id="register-section">
            <h2>Criar Conta</h2>
            <form id="registro">
                <div class="input-group">
                    <label for="nome">Nome Completo</label>
                    <input type="text" id="nome" required placeholder="Ex: João Silva" />
                </div>
                <div class="input-group">
                    <label for="reg-email">Email</label>
                    <input type="email" id="reg-email" required placeholder="seu@email.com" />
                </div>
                <div class="input-group">
                    <label for="reg-senha">Senha</label>
                    <input type="password" id="reg-senha" required placeholder="****" />
                </div>
                <div class="input-group">
                    <label for="conf-senha">Confirme sua senha</label>
                    <input type="password" id="conf-senha" required placeholder="****">
                </div>
                <div class="input-group">
                    <label for="role">Tipo de Usuário (admin/professor/aluno)</label>
                    <input type="text" id="role" placeholder="Ex: professor">
                </div>
                <button id="bnt" type="submit" class="btn">Registrar-se</button>
            </form>
            <div class="switch-text">
                <p>Já possui conta? <a href="Index.html">Fazer Login</a></p>
            </div>
        </div>
    </div>
</div>
    <script src="script.js"></script>
</body>
</html>
