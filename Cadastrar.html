<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="Cadastrar.css">
</head>
<body>
    <div class="auth-container">
        <div class="form-card">
        <div id="MensagemBox"></div>
        <div id="register-section">
          <h2>Criar Conta</h2>
          <p class="subtitle">Junte-se à nossa comunidade</p>

          <form id="registro">
            <div class="input-group">
              <label for="reg-nome">Nome Completo</label>
              <input
                type="text"
                id="nome"
                placeholder="Ex: João Silva"
              />
            </div>
            <div class="input-group">
              <label for="reg-email">Email</label>
              <input
                type="email"
                id="reg-email"
                placeholder="seu@email.com"
              />
            </div>
            <div class="input-group">
              <label for="reg-senha">Senha</label>
              <input
                type="password"
                id="reg-senha"
                placeholder="****"
              />
            </div>
            <div class="input-group">
                <label for="confirmar-senha">Confirme sua senha</label>
                <input type="password" id="conf-senha" placeholder="****">
            </div>
            <div class="input-group">
              <label for="role">Tipo de Usuário</label>
              <input type="text" id="role" placeholder="obrigatorio">
            </div>
            <button id="bnt" type="submit" class="btn">Registrar-se</button>
          </form>

          <div class="switch-text">
            Já possui conta?
            <a class="btn-link" href="Index.html">Fazer Login</button>
          </div>
        </div>
      </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
